name: Build Agentic Signal

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  build:
    strategy:
      matrix:
        platform: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Get Package Version
        id: pkg_version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: oven-sh/setup-bun@v2

      - name: Install root dependencies
        run: bun install

      - name: Install client dependencies
        run: cd client && bun install

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build backend (Windows)
        if: matrix.platform == 'windows-latest'
        run: bun run build:windows

      - name: Build backend (macOS)
        if: matrix.platform == 'macos-latest'
        run: bun run build:macos

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build backend (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: bun run build:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: agentic-signal-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.tar.gz


  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Get Package Version
        id: pkg_version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: agentic-signal-windows-latest
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: agentic-signal-macos-latest
          path: dist/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: agentic-signal-ubuntu-latest
          path: dist/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg_version.outputs.VERSION }}
          name: Agentic Signal v${{ steps.pkg_version.outputs.VERSION }}
          files: |
            dist/windows/**/*.msi
            dist/windows/**/*.exe
            dist/macos/**/*.dmg
            dist/macos/**/*.app.tar.gz
            dist/linux/**/*.AppImage
            dist/linux/**/*.deb
            dist/linux/**/*.rpm
            dist/linux/**/*.zip
            dist/linux/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}